name: Java CI/CD Pipeline

# Kích hoạt CI khi có người đẩy code hoặc tạo Pull Request vào nhánh develop
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code (Lấy code từ GitHub)
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' 
        distribution: 'temurin'
        cache: maven

    - name: Run All Unit Tests 
      run: mvn -B test